<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA - Foto del Día</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container py-4">
    <h1 class="text-center mb-4">Explorador Espacial NASA</h1>

    <div class="row">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="mb-3">
                    <label class="form-label">Elegir una fecha:</label>
                    <input type="date" id="inputFecha" class="form-control">
                </div>
                
                <div id="contenedorApod">
                    <p>Cargando...</p>
                </div>

                <button id="btnFavorito" class="btn btn-primary mt-3">Guardar como Favorito</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Mis Favoritos</h3>
                <div id="listaFavoritos" class="list-group">
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
